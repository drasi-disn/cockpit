<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Remontée d'activité</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #eef0f6;
    --card-bg: #ffffff;
    --text: #11162a;
    --text-soft: #6b7386;
    --border: #e3e6ee;
    --shadow: 0 1px 2px rgba(15,23,42,0.05), 0 1px 3px rgba(15,23,42,0.05);
    --shadow-hover: 0 14px 30px rgba(15,23,42,0.10), 0 2px 8px rgba(15,23,42,0.06);
    --radius: 20px;
    --radius-sm: 14px;
    --accent: #2f5fdb;
    --ink: #11162a;
    --ink-soft: #232c48;

    --font-display: 'Sora', -apple-system, sans-serif;
    --font-body: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;

    --c-projet: #3159c9;      --c-projet-bg: #edf1ff;
    --c-incident: #c23e3e;    --c-incident-bg: #fdecec;
    --c-arbitrage: #6d43c9;   --c-arbitrage-bg: #f1ecfd;
    --c-ssi: #ab7a0d;         --c-ssi-bg: #fdf3e1;
    --c-info: #157a52;        --c-info-bg: #e6f6ee;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
  }

  body {
    background:
      radial-gradient(900px 480px at 100% -8%, #e7ecfb, transparent),
      var(--bg);
  }

  #app {
    max-width: 560px;
    margin: 0 auto;
    min-height: 100vh;
    padding: 22px 20px 32px;
    display: flex;
    flex-direction: column;
  }

  button { font-family: inherit; }
  :focus-visible { outline: 2.5px solid var(--accent); outline-offset: 2px; }

  /* ---------- Header ---------- */
  .header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .header .eyebrow {
    display: block;
    font-family: var(--font-mono);
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: .11em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .header .titles h1 {
    font-family: var(--font-display);
    font-size: 21px;
    font-weight: 700;
    margin: 0 0 3px;
    letter-spacing: -0.3px;
    color: var(--ink);
  }
  .header .titles p {
    margin: 0;
    font-size: 12.5px;
    color: var(--text-soft);
    text-transform: capitalize;
    font-weight: 500;
  }

  .person-picker {
    position: relative;
    margin-top: 2px;
  }
  .person-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px 14px 6px 6px;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: box-shadow .15s ease, transform .15s ease, border-color .15s ease;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }
  .person-chip:hover { box-shadow: var(--shadow-hover); transform: translateY(-1px); border-color: #d7dcec; }
  .person-avatar {
    width: 27px; height: 27px;
    border-radius: 50%;
    background: var(--ink);
    color: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 11.5px; font-weight: 700;
    font-family: var(--font-display);
    flex-shrink: 0;
  }
  .person-menu {
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    box-shadow: var(--shadow-hover);
    padding: 6px;
    min-width: 175px;
    display: none;
    z-index: 20;
  }
  .person-menu.open { display: block; animation: popIn .12s ease; }
  .person-menu button {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    padding: 9px 10px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
  }
  .person-menu button:hover { background: var(--bg); }
  .person-menu .empty {
    padding: 10px;
    font-size: 12.5px;
    color: var(--text-soft);
    font-weight: 500;
  }

  @keyframes popIn { from { opacity: 0; transform: translateY(-4px) scale(.98); } to { opacity: 1; transform: translateY(0) scale(1); } }

  /* ---------- Progress ---------- */
  .progress-wrap { margin-bottom: 26px; }
  .progress-track {
    height: 5px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #6f8ff0);
    border-radius: 4px;
    transition: width .35s cubic-bezier(.4,0,.2,1);
    width: 8%;
  }
  .progress-steps {
    display: flex;
    justify-content: space-between;
    margin-top: 7px;
    font-family: var(--font-mono);
    font-size: 9.5px;
    font-weight: 600;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--text-soft);
  }

  /* ---------- Screens ---------- */
  .screen {
    flex: 1;
    display: none;
    flex-direction: column;
  }
  .screen.active {
    display: flex;
    animation: fadeSlideIn .3s cubic-bezier(.4,0,.2,1);
  }
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .prompt {
    font-family: var(--font-display);
    font-size: 16.5px;
    font-weight: 700;
    margin: 2px 0 16px;
    letter-spacing: -0.1px;
    color: var(--ink);
  }

  /* ---------- Category cards ---------- */
  .card-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .cat-card {
    position: relative;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 16px 18px 20px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 11px;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: transform .15s cubic-bezier(.4,0,.2,1), box-shadow .15s ease, border-color .15s ease;
    text-align: left;
    overflow: hidden;
  }
  .cat-card::before {
    content: "";
    position: absolute;
    left: 0; top: 14px; bottom: 14px;
    width: 3.5px;
    border-radius: 4px;
  }
  .cat-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); border-color: #d7dcec; }
  .cat-card:active { transform: translateY(0) scale(.98); }
  .cat-card .icon-badge {
    width: 40px; height: 40px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .cat-card .icon-badge svg { width: 20px; height: 20px; }
  .cat-card .label {
    font-family: var(--font-display);
    font-size: 14.5px;
    font-weight: 700;
    color: var(--ink);
  }
  .cat-card .sub { font-size: 11.5px; color: var(--text-soft); font-weight: 500; margin-top: -6px; }

  .cat-card.projet .icon-badge { background: var(--c-projet-bg); color: var(--c-projet); }
  .cat-card.incident .icon-badge { background: var(--c-incident-bg); color: var(--c-incident); }
  .cat-card.arbitrage .icon-badge { background: var(--c-arbitrage-bg); color: var(--c-arbitrage); }
  .cat-card.ssi .icon-badge { background: var(--c-ssi-bg); color: var(--c-ssi); }
  .cat-card.information .icon-badge { background: var(--c-info-bg); color: var(--c-info); }

  .cat-card.projet::before { background: var(--c-projet); }
  .cat-card.incident::before { background: var(--c-incident); }
  .cat-card.arbitrage::before { background: var(--c-arbitrage); }
  .cat-card.ssi::before { background: var(--c-ssi); }
  .cat-card.information::before { background: var(--c-info); }

  .cat-card.wide { grid-column: span 2; flex-direction: row; align-items: center; }
  .cat-card.wide .label { font-size: 15px; }

  /* ---------- Screen 2 : description ---------- */
  .badge-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
  }
  .back-btn {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--card-bg);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    box-shadow: var(--shadow);
    flex-shrink: 0;
    transition: transform .12s ease, border-color .12s ease;
    color: var(--text);
  }
  .back-btn:hover { transform: translateX(-2px); border-color: #d7dcec; }
  .back-btn svg { width: 16px; height: 16px; }

  .cat-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 7px 14px 7px 7px;
    border-radius: 999px;
    font-size: 13.5px;
    font-weight: 700;
    font-family: var(--font-display);
  }
  .cat-pill .icon-badge-sm {
    width: 26px; height: 26px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,.65);
  }
  .cat-pill .icon-badge-sm svg { width: 14px; height: 14px; }

  textarea#description {
    width: 100%;
    flex: 1;
    min-height: 160px;
    resize: none;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    font-size: 15.5px;
    line-height: 1.55;
    font-family: var(--font-body);
    color: var(--text);
    background: var(--card-bg);
    box-shadow: var(--shadow);
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  textarea#description:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(47,95,219,0.12);
  }
  textarea#description::placeholder { color: #a3a9ba; }

  .helper-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
    font-size: 12px;
    color: var(--text-soft);
  }
  .ai-hint {
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: 500;
  }
  .ai-hint .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: .35; } 50% { opacity: 1; } }
  #charCount { font-family: var(--font-mono); font-weight: 600; }

  .send-btn {
    margin-top: 18px;
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 15.5px;
    font-weight: 700;
    font-family: var(--font-display);
    color: white;
    background: linear-gradient(135deg, var(--ink), var(--ink-soft));
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: transform .12s cubic-bezier(.4,0,.2,1), box-shadow .15s ease, opacity .15s ease, background .2s ease;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .send-btn:disabled { opacity: .4; cursor: not-allowed; }
  .send-btn:not(:disabled):hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); background: linear-gradient(135deg, var(--ink-soft), var(--accent)); }
  .send-btn:not(:disabled):active { transform: translateY(0) scale(.98); }
  .send-btn .spinner {
    width: 16px; height: 16px;
    border: 2.5px solid rgba(255,255,255,.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    display: none;
  }
  .send-btn.loading .spinner { display: inline-block; }
  .send-btn.loading .send-label { opacity: .7; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .kbd-hint { text-align: center; margin-top: 12px; font-size: 11.5px; color: var(--text-soft); }
  .kbd-hint kbd {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 1.5px 6px;
    font-family: var(--font-mono);
    font-size: 10.5px;
  }

  /* ---------- Screen 3 : success ---------- */
  .success-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 6px;
  }
  .success-circle {
    width: 84px; height: 84px;
    border-radius: 50%;
    background: var(--c-info-bg);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 18px;
    animation: popIn .35s cubic-bezier(.34,1.56,.64,1);
  }
  .success-circle svg { width: 40px; height: 40px; }
  .success-circle svg path {
    stroke: var(--c-info);
    stroke-width: 3;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 48;
    stroke-dashoffset: 48;
    animation: draw .45s ease .15s forwards;
  }
  @keyframes draw { to { stroke-dashoffset: 0; } }

  .success-wrap h2 { font-family: var(--font-display); font-size: 19.5px; margin: 0 0 4px; font-weight: 700; color: var(--ink); }
  .success-wrap p { margin: 0; font-size: 13.5px; color: var(--text-soft); }

  .again-btn {
    margin-top: 22px;
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 999px;
    padding: 10px 20px;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
    transition: border-color .15s ease, transform .12s ease, color .15s ease;
  }
  .again-btn:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }

  /* ---------- Error toast ---------- */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--ink);
    color: white;
    padding: 12px 18px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 600;
    box-shadow: 0 10px 28px rgba(0,0,0,.28);
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s ease, transform .2s ease;
    max-width: 90%;
    text-align: center;
    z-index: 50;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 380px) {
    .card-grid { grid-template-columns: 1fr; }
    .cat-card.wide { grid-column: span 1; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; }
  }
</style>
</head>
<body>
<div id="app">

  <div class="header">
    <div class="titles">
      <span class="eyebrow">Journal d'activité</span>
      <h1>Remontée d'activité</h1>
      <p id="todayLabel">Aujourd'hui</p>
    </div>
    <div class="person-picker">
      <div class="person-chip" id="personChip">
        <span class="person-avatar" id="personAvatar">?</span>
        <span id="personName">Qui es-tu ?</span>
      </div>
      <div class="person-menu" id="personMenu"></div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-steps"><span>Catégorie</span><span>Description</span><span>Envoi</span></div>
  </div>

  <!-- SCREEN 1 : catégories -->
  <div class="screen active" id="screen1">
    <div class="prompt">Que souhaites-tu signaler ?</div>
    <div class="card-grid" id="cardGrid"></div>
  </div>

  <!-- SCREEN 2 : description -->
  <div class="screen" id="screen2">
    <div class="badge-row">
      <div class="back-btn" id="backBtn" title="Changer de catégorie">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M15 18l-6-6 6-6"/></svg>
      </div>
      <div class="cat-pill" id="catPill"></div>
    </div>
    <div class="prompt" id="descPrompt">Décris simplement le sujet</div>
    <textarea id="description" placeholder="Écris comme tu le dirais à voix haute…"></textarea>
    <div class="helper-row">
      <span class="ai-hint"><span class="dot"></span> L'IA structure automatiquement ta remontée</span>
      <span id="charCount">0</span>
    </div>
    <button class="send-btn" id="sendBtn" disabled>
      <span class="spinner"></span>
      <span class="send-label">Envoyer</span>
    </button>
    <div class="kbd-hint">Astuce : <kbd>Ctrl</kbd> + <kbd>Entrée</kbd> pour envoyer</div>
  </div>

  <!-- SCREEN 3 : succès -->
  <div class="screen" id="screen3">
    <div class="success-wrap">
      <div class="success-circle">
        <svg viewBox="0 0 24 24"><path d="M4 12.5l5 5.5L20 6"/></svg>
      </div>
      <h2 id="successTitle">C'est transmis !</h2>
      <p id="successSub">Merci, ta remontée est enregistrée.</p>
      <button class="again-btn" id="againBtn">Signaler autre chose</button>
    </div>
  </div>

</div>

<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<script>
(function () {
  "use strict";

  // ---------------------------------------------------------------
  // Configuration : catégories affichées + mapping vers la colonne
  // "Nature" (Choice) de la table Activite_Poles :
  //   exploitation | incident | projet | risque | arbitrage | info
  // Les icônes sont des SVG en ligne (currentColor) pour un rendu net.
  // ---------------------------------------------------------------
  var ICONS = {
    projet: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/></svg>',
    incident: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3.5 21.5 20h-19L12 3.5z"/><path d="M12 10v4"/><circle cx="12" cy="17" r="0.6" fill="currentColor" stroke="none"/></svg>',
    arbitrage: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18M5 7h14M5 7l-3 6a3.5 3.5 0 0 0 7 0L5 7zM19 7l-3 6a3.5 3.5 0 0 0 7 0L19 7zM8 21h8"/></svg>',
    ssi: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 3v6c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V6l7-3z"/><path d="M9.5 12l1.8 1.8L14.7 10"/></svg>',
    info: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 11v5.5"/><circle cx="12" cy="8" r="0.6" fill="currentColor" stroke="none"/></svg>'
  };

  var CATEGORIES = [
    { id: "Projet",      nature: "projet",    label: "Projet",      icon: ICONS.projet,    cls: "projet",     sub: "Avancement, retard, jalon",
      placeholder: "Où en est le projet ? Qu'est-ce qui a changé ?" },
    { id: "Incident",    nature: "incident",  label: "Incident",    icon: ICONS.incident,  cls: "incident",   sub: "Panne, blocage, urgence",
      placeholder: "Que s'est-il passé ? Quel est l'impact ?" },
    { id: "Arbitrage",   nature: "arbitrage", label: "Arbitrage",   icon: ICONS.arbitrage, cls: "arbitrage",  sub: "Décision à prendre",
      placeholder: "Quelle décision faut-il prendre, et pourquoi ?" },
    { id: "SSI",         nature: "risque",    label: "SSI",         icon: ICONS.ssi,       cls: "ssi",        sub: "Sécurité, risque cyber",
      placeholder: "Quelle est l'alerte ou le risque sécurité ?" },
    { id: "Information", nature: "info",      label: "Information", icon: ICONS.info,      cls: "information", sub: "Simple partage",
      placeholder: "Quelle information veux-tu partager ?" }
  ];

  // Repli si l'appel à la table Agents échoue (ne devrait pas arriver
  // en usage normal dans Grist, mais évite un écran bloqué).
  var FALLBACK_PEOPLE = [
    { id: null, name: "Laurent" },
    { id: null, name: "Christophe" }
  ];

  var STORAGE_KEY = "activitePoles.adjointId";

  // ---------------------------------------------------------------
  // État
  // ---------------------------------------------------------------
  var state = {
    person: null,      // { id: rowId, name: "Laurent" }
    category: null,
    sending: false
  };
  var PEOPLE = [];

  // ---------------------------------------------------------------
  // DOM refs
  // ---------------------------------------------------------------
  var $ = function (id) { return document.getElementById(id); };
  var screen1 = $("screen1"), screen2 = $("screen2"), screen3 = $("screen3");
  var progressFill = $("progressFill");
  var cardGrid = $("cardGrid");
  var catPill = $("catPill");
  var descPrompt = $("descPrompt");
  var descriptionEl = $("description");
  var charCount = $("charCount");
  var sendBtn = $("sendBtn");
  var backBtn = $("backBtn");
  var againBtn = $("againBtn");
  var personChip = $("personChip");
  var personMenu = $("personMenu");
  var personName = $("personName");
  var personAvatar = $("personAvatar");
  var successTitle = $("successTitle");
  var successSub = $("successSub");

  // ---------------------------------------------------------------
  // Date du jour, en français
  // ---------------------------------------------------------------
  try {
    var today = new Date();
    var fmt = new Intl.DateTimeFormat("fr-FR", { weekday: "long", day: "numeric", month: "long" });
    $("todayLabel").textContent = "Aujourd'hui · " + fmt.format(today);
  } catch (e) { /* garde "Aujourd'hui" par défaut */ }

  // ---------------------------------------------------------------
  // Semaine ISO (ex: "2026-S29"), pour recoupement avec Reporting_Hebdo
  // ---------------------------------------------------------------
  function isoWeekLabel(d) {
    var date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
    var dayNum = date.getUTCDay() || 7;
    date.setUTCDate(date.getUTCDate() + 4 - dayNum);
    var yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
    var weekNo = Math.ceil(((date - yearStart) / 86400000 + 1) / 7);
    return date.getUTCFullYear() + "-S" + (weekNo < 10 ? "0" + weekNo : weekNo);
  }

  function genActiviteId() {
    return "ACT-" + Date.now().toString(36).toUpperCase();
  }

  // ---------------------------------------------------------------
  // Sélecteur de personne — chargé dynamiquement depuis la table Agents
  // ---------------------------------------------------------------
  function renderPersonMenu() {
    personMenu.innerHTML = "";
    if (!PEOPLE.length) {
      var empty = document.createElement("div");
      empty.className = "empty";
      empty.textContent = "Aucun agent trouvé";
      personMenu.appendChild(empty);
      return;
    }
    PEOPLE.forEach(function (p) {
      var btn = document.createElement("button");
      btn.textContent = p.name;
      btn.addEventListener("click", function () {
        setPerson(p);
        personMenu.classList.remove("open");
      });
      personMenu.appendChild(btn);
    });
  }

  function setPerson(p) {
    state.person = p;
    if (p.id != null) { localStorage.setItem(STORAGE_KEY, String(p.id)); }
    personName.textContent = p.name.split(" ")[0];
    personAvatar.textContent = p.name.charAt(0).toUpperCase();
  }

  function restoreSavedPerson() {
    var savedId = localStorage.getItem(STORAGE_KEY);
    if (!savedId) { return; }
    var match = PEOPLE.filter(function (p) { return String(p.id) === savedId; })[0];
    if (match) { setPerson(match); }
  }

  function loadAgents() {
    if (!window.grist || !grist.docApi || !grist.docApi.fetchTable) {
      PEOPLE = FALLBACK_PEOPLE;
      renderPersonMenu();
      return;
    }
    grist.docApi.fetchTable("Agents").then(function (data) {
      var ids = data.id || [];
      var noms = data.Nom || [];
      var actifs = data.Actif || [];
      PEOPLE = ids
        .map(function (rowId, i) { return { id: rowId, name: noms[i], actif: actifs[i] !== false }; })
        .filter(function (p) { return p.actif && p.name; });
      if (!PEOPLE.length) { PEOPLE = FALLBACK_PEOPLE; }
      renderPersonMenu();
      restoreSavedPerson();
    }).catch(function () {
      PEOPLE = FALLBACK_PEOPLE;
      renderPersonMenu();
    });
  }

  personChip.addEventListener("click", function (e) {
    e.stopPropagation();
    personMenu.classList.toggle("open");
  });
  document.addEventListener("click", function () { personMenu.classList.remove("open"); });

  // ---------------------------------------------------------------
  // Écran 1 : cartes de catégories
  // ---------------------------------------------------------------
  function renderCards() {
    cardGrid.innerHTML = "";
    CATEGORIES.forEach(function (cat) {
      var card = document.createElement("div");
      card.className = "cat-card " + cat.cls;
      card.innerHTML =
        '<span class="icon-badge">' + cat.icon + '</span>' +
        '<span class="label">' + cat.label + '</span>' +
        '<span class="sub">' + cat.sub + '</span>';
      card.addEventListener("click", function () { selectCategory(cat); });
      cardGrid.appendChild(card);
    });
  }

  function selectCategory(cat) {
    state.category = cat;
    catPill.innerHTML =
      '<span class="icon-badge-sm">' + cat.icon + '</span><span>' + cat.label + '</span>';
    catPill.style.background = getComputedStyle(document.documentElement).getPropertyValue("--c-" + cssKey(cat.cls) + "-bg");
    catPill.style.color = getComputedStyle(document.documentElement).getPropertyValue("--c-" + cssKey(cat.cls));
    descPrompt.textContent = "Décris simplement le sujet";
    descriptionEl.placeholder = cat.placeholder;
    descriptionEl.value = "";
    updateCharCount();
    goToScreen(2);
    setTimeout(function () { descriptionEl.focus(); }, 250);
  }

  function cssKey(cls) { return cls === "information" ? "info" : cls; }

  // ---------------------------------------------------------------
  // Navigation entre écrans
  // ---------------------------------------------------------------
  function goToScreen(n) {
    [screen1, screen2, screen3].forEach(function (s) { s.classList.remove("active"); });
    if (n === 1) { screen1.classList.add("active"); progressFill.style.width = "8%"; }
    if (n === 2) { screen2.classList.add("active"); progressFill.style.width = "55%"; }
    if (n === 3) { screen3.classList.add("active"); progressFill.style.width = "100%"; }
  }

  backBtn.addEventListener("click", function () { goToScreen(1); });

  // ---------------------------------------------------------------
  // Écran 2 : saisie
  // ---------------------------------------------------------------
  function updateCharCount() {
    var len = descriptionEl.value.trim().length;
    charCount.textContent = len + " caractère" + (len > 1 ? "s" : "");
    sendBtn.disabled = len < 6 || state.sending;
  }
  descriptionEl.addEventListener("input", updateCharCount);
  descriptionEl.addEventListener("keydown", function (e) {
    if ((e.ctrlKey || e.metaKey) && e.key === "Enter" && !sendBtn.disabled) {
      submitEntry();
    }
  });
  sendBtn.addEventListener("click", submitEntry);

  function showToast(msg) {
    var t = document.querySelector(".toast");
    if (!t) {
      t = document.createElement("div");
      t.className = "toast";
      document.body.appendChild(t);
    }
    t.textContent = msg;
    requestAnimationFrame(function () { t.classList.add("show"); });
    setTimeout(function () { t.classList.remove("show"); }, 3200);
  }

  // ---------------------------------------------------------------
  // Envoi vers Grist — table Activite_Poles
  // ---------------------------------------------------------------
  function submitEntry() {
    var text = descriptionEl.value.trim();
    if (!text || !state.category) { return; }
    if (!state.person || state.person.id == null) {
      showToast("Choisis d'abord qui tu es, en haut à droite.");
      personMenu.classList.add("open");
      return;
    }

    state.sending = true;
    sendBtn.classList.add("loading");
    sendBtn.disabled = true;

    var now = new Date();
    var record = {
      Activite_ID: genActiviteId(),
      Date_remontee: Math.floor(now.getTime() / 1000),
      Semaine: isoWeekLabel(now),
      Nature: state.category.nature,
      Objet: text.length > 80 ? text.slice(0, 77) + "…" : text,
      Description_courte: text,
      Statut: "signalé",
      Traite: false,
      IA_enrichi: false,
      Adjoint: state.person.id
    };

    Promise.resolve()
      .then(function () { return grist.getTable(); })
      .then(function (table) { return table.create({ fields: record }); })
      .then(function () {
        state.sending = false;
        sendBtn.classList.remove("loading");
        successTitle.textContent = "C'est transmis !";
        successSub.textContent = "Merci " + state.person.name.split(" ")[0] + ", à bientôt.";
        goToScreen(3);
        setTimeout(function () {
          goToScreen(1);
          sendBtn.disabled = true;
        }, 2200);
      })
      .catch(function (err) {
        state.sending = false;
        sendBtn.classList.remove("loading");
        sendBtn.disabled = false;
        console.error(err);
        showToast("Oups, l'envoi a échoué. Réessaie.");
      });
  }

  againBtn.addEventListener("click", function () { goToScreen(1); });

  // ---------------------------------------------------------------
  // Init
  // ---------------------------------------------------------------
  renderCards();
  goToScreen(1);
  loadAgents();

  if (window.grist) {
    grist.ready({ requiredAccess: "full" });
  }
})();
</script>
</body>
</html>
